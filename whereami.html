<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>time for lab?</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111827;
  color: #e5e7eb;
  text-align: center;
  padding: 20px;
}

h1 {
  font-weight: 700;
  margin-bottom: 20px;
}

.clock {
  position: relative;
  width: 300px;
  height: 300px;
  border: 4px solid #e5e7eb;
  border-radius: 50%;
  margin: 20px auto;
  background: #0f172a;
}

.tick {
  position: absolute;
  width: 2px;
  height: 12px;
  background: #e5e7eb;
  left: 50%;
  top: 0;
  transform-origin: center 150px;
}

.hand {
  position: absolute;
  left: 50%;
  bottom: 150px;
  transform-origin: bottom center;
  background: #38bdf8;
  border-radius: 3px;
}

.hand.hour {
  width: 8px;
  height: 70px;
}

.hand.minute {
  width: 5px;
  height: 100px;
}

#secret {
  display: none;
  margin-top: 20px;
  padding: 12px;
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 6px;
  text-align: left;
  max-width: 90%;
  margin-left: auto;
  margin-right: auto;
  white-space: pre-wrap;
}
</style>
</head>
<body>

<h1>time for lab?</h1>

<div id="clock" class="clock">
  <div id="hour" class="hand hour"></div>
  <div id="minute" class="hand minute"></div>
</div>

<div id="secret"></div>

<script>
/* SAFARI-SAFE CLOCK */

// Build ticks (12 major marks)
const clock = document.getElementById("clock");
for (let i = 0; i < 12; i++) {
  const t = document.createElement("div");
  t.className = "tick";
  t.style.transform = "translateX(-50%) rotate(" + (i * 30) + "deg)";
  clock.appendChild(t);
}

const hourHand = document.getElementById("hour");
const minuteHand = document.getElementById("minute");
