<style>

  text-align: center;
  padding: 20px;
}

h1 {
  font-weight: 700;
  margin-bottom: 20px;
}

.clock {
  position: relative;
  width: 300px;
  height: 300px;
  border: 4px solid #e5e7eb;
  border-radius: 50%;
  margin: 20px auto;
  background: #0f172a;
}

.tick {
  position: absolute;
  width: 2px;
  height: 12px;
  background: #e5e7eb;
  left: 50%;
  top: 0;
  transform-origin: center 150px;
}

.hand {
  position: absolute;
  left: 50%;
  bottom: 150px;
  transform-origin: bottom center;
  background: #38bdf8;
  border-radius: 3px;

  /* Restore drag on Safari/iOS */
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  cursor: grab;
}
.hand.hour { width: 8px;  height: 70px; }
.hand.minute { width: 5px; height: 100px; }
.hand.dragging { cursor: grabbing; }

#secret {
  display: none;
  margin-top: 20px;
  padding: 12px;
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 6px;
  text-align: left;
  max-width: 90%;
  margin-left: auto;
  margin-right: auto;
  white-space: pre-wrap;
}
</style>

<body>

<h1>time for lab?</h1>

<div id="clock" class="clock">
  <div id="hour" class="hand hour"></div>
  <div id="minute" class="hand minute"></div>

<script>
/* SIMPLE, SAFARI-SAFE ANALOG CLOCK */

// Build 12 ticks
const clock = document.getElementById("clock");
for (let i = 0; i < 12; i++) {
  const t = document.createElement("div");
  t.className = "tick";
  t.style.transform = "translateX(-50%) rotate(" + (i * 30) + "deg)";
  clock.appendChild(t);
}

const hourHand = document.getElementById("hour");
const minuteHand = document.getElementById("minute");

// ----- Start at 5:35 (snapped hour hand to 5) -----
const startMinuteDeg = 35 * 6;   // 210°
const startHourDeg   = 5 * 30;   // 150°
hourHand.style.transform   = "translateX(-50%) rotate(" + startHourDeg + "deg)";
minuteHand.style.transform = "translateX(-50%) rotate(" + startMinuteDeg + "deg)";
hourHand.dataset.angle = String(startHourDeg);
minuteHand.dataset.angle = String(startMinuteDeg);
// ---------------------------------------------------

let dragging = null;

function getAngle(ev) {
  const r = clock.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top + r.height / 2;
  const x = ev.clientX - cx;
  const y = ev.clientY - cy;
  const ang = Math.atan2(x, -y) * 180 / Math.PI; // 0° at 12 o'clock, clockwise
  return (ang + 360) % 360;
}

function snap(v, step) {
  return Math.round(v / step) * step;
}

function onPointerDown(which) {
  return function(ev) {
    ev.preventDefault(); // stop scroll/zoom text selection on iOS Safari
    dragging = which;
    if (ev.target.setPointerCapture) ev.target.setPointerCapture(ev.pointerId);
    (which === "hour" ? hourHand : minuteHand).classList.add("dragging");
  };
}

function onPointerMove(ev) {
  if (!dragging) return;
  const ang = getAngle(ev);
  if (dragging === "hour") {
    const snapped = snap(ang, 30);
    hourHand.style.transform = "translateX(-50%) rotate(" + snapped + "deg)";
    hourHand.dataset.angle = snapped;
  } else {
    const snapped = snap(ang, 6);
    minuteHand.style.transform = "translateX(-50%) rotate(" + snapped + "deg)";
    minuteHand.dataset.angle = snapped;
  }
}

function onPointerUpOrCancel() {
  if (!dragging) return;
  (dragging === "hour" ? hourHand : minuteHand).classList.remove("dragging");
  dragging = null;
  checkSolved();
}

hourHand.addEventListener("pointerdown", onPointerDown("hour"));
minuteHand.addEventListener("pointerdown", onPointerDown("minute"));
document.addEventListener("pointermove", onPointerMove);
document.addEventListener("pointerup", onPointerUpOrCancel);
document.addEventListener("pointercancel", onPointerUpOrCancel);

function checkSolved() {
  const h = parseInt(hourHand.dataset.angle || "0", 10);
  const m = parseInt(minuteHand.dataset.angle || "0", 10);
  if (h === 30 && m === 0) reveal();
}
