<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>time for lab?</title>
  <style>
    :root {
      --bg: #0f172a;          /* slate-900 */
      --fg: #e2e8f0;          /* slate-200 */
      --muted: #94a3b8;       /* slate-400 */
      --accent: #38bdf8;      /* sky-400 */
      --accent-2: #22d3ee;    /* cyan-400 */
    }

    html, body {
      height: 100%;
      margin: 0;
      background: radial-gradient(1200px 800px at 50% -10%, #1e293b, var(--bg));
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 20px 60px;
      text-align: center;
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(24px, 6vw, 44px);
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, var(--fg), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sub {
      margin-top: -6px;
      margin-bottom: 22px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .clock {
      position: relative;
      width: min(82vw, 360px);
      height: min(82vw, 360px);
      margin: 0 auto 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 35%, #0b1324, #0b1324 35%, #0a1221 36%, #0a1221);
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.06) inset,
        0 8px 30px rgba(0,0,0,0.55),
        0 1px 0 rgba(255,255,255,0.06) inset;
    }

    /* ticks */
    .tick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 46%;
      transform-origin: 50% 100%;
      opacity: 0.35;
    }
    .tick::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 2px;
      height: 10%;
      background: var(--fg);
      border-radius: 1px;
    }
    .tick.major { opacity: 0.9; }
    .tick.major::before { height: 14%; width: 3px; border-radius: 2px; }

    /* center pivot */
    .pivot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.5);
      pointer-events: none;
    }

    .hand {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 100%;
      transform: translate(-50%, -100%) rotate(0deg);
      border-radius: 4px;
      user-select: none;
      touch-action: none; /* allow pointer events to capture rotation */
    }
    .hand.minute {
      width: 6px;
      height: 44%;
      background: linear-gradient(180deg, #c7d2fe, #a5b4fc);
      box-shadow: 0 6px 18px rgba(56, 189, 248, 0.35);
      cursor: grab;
    }
    .hand.hour {
      width: 8px;
      height: 32%;
      background: linear-gradient(180deg, #67e8f9, #22d3ee);
      box-shadow: 0 6px 18px rgba(34, 211, 238, 0.35);
      cursor: grab;
    }
    .hand.dragging { cursor: grabbing; }

    .helper { color: var(--muted); font-size: 0.95rem; margin: 10px 0 22px; }

    #secret { display: none; text-align: left; margin: 26px auto 0; max-width: 900px; }
    #secret h2 { margin: 0 0 8px; font-size: 1.05rem; color: var(--accent-2); }
    #secret .cipher {
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.35;
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .footer { margin-top: 26px; font-size: 0.85rem; color: var(--muted); }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>time for lab?</h1>
    <div class="sub" aria-hidden="true">Drag the hands to set the time. Hint: some moments unlock what’s hidden.</div>

    <div id="clock" class="clock" aria-label="Interactive analog clock" role="application">
      <!-- hour marks (12 major, 60 minor) generated by JS for simplicity -->
      <div class="pivot" aria-hidden="true"></div>
      <div id="hour-hand" class="hand hour" aria-label="Hour hand" tabindex="0"></div>
      <div id="minute-hand" class="hand minute" aria-label="Minute hand" tabindex="0"></div>
    </div>

    <div id="secret" aria-live="polite">
      <h2>Revealed text</h2>
      <div id="cipher" class="cipher"></div>
    </div>

    <div class="footer">This page is a single self‑contained HTML file. Host it anywhere, including GitHub Pages.</div>
  </main>

  <script>
    (function() {
      const clock = document.getElementById('clock');
      const hourHand = document.getElementById('hour-hand');
      const minuteHand = document.getElementById('minute-hand');
      const secret = document.getElementById('secret');
      const cipherEl = document.getElementById('cipher');

      // Build ticks
      for (let i = 0; i < 60; i++) {
        const t = document.createElement('div');
        t.className = 'tick' + (i % 5 === 0 ? ' major' : '');
        t.style.transform = `translate(-50%, -100%) rotate(${i * 6}deg)`;
        clock.appendChild(t);
      }

      // State
      let hourAngle = 0;   // snapped to 30° increments
      let minuteAngle = 0; // snapped to 6° increments
      let dragging = null; // 'hour' | 'minute' | null

      const setHourAngle = (deg) => {
        hourAngle = ((deg % 360) + 360) % 360;
        hourHand.style.transform = `translate(-50%, -100%) rotate(${hourAngle}deg)`;
      };
      const setMinuteAngle = (deg) => {
        minuteAngle = ((deg % 360) + 360) % 360;
        minuteHand.style.transform = `translate(-50%, -100%) rotate(${minuteAngle}deg)`;
      };

      // Initialize hands to 12:00
      setHourAngle(0);
      setMinuteAngle(0);

      function getAngleFromEvent(ev) {
        const rect = clock.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const x = ev.clientX - cx;
        const y = ev.clientY - cy;
        // Angle where 0° = 12 o'clock, increases clockwise
        const ang = Math.atan2(x, -y) * 180 / Math.PI; // swap to make 0 at top
        return (ang + 360) % 360;
      }

      function snap(value, step) {
        return Math.round(value / step) * step;
      }

      function onPointerDown(which) {
        return function(ev) {
          ev.preventDefault();
          dragging = which; // 'hour' or 'minute'
          (which === 'hour' ? hourHand : minuteHand).classList.add('dragging');
          ev.target.setPointerCapture?.(ev.pointerId);
        };
      }

      function onPointerMove(ev) {
        if (!dragging) return;
        const ang = getAngleFromEvent(ev);
        if (dragging === 'minute') {
          const snapped = snap(ang, 6);
          setMinuteAngle(snapped);
        } else if (dragging === 'hour') {
          const snapped = snap(ang, 30);
          setHourAngle(snapped);
        }
      }

      function onPointerUp(ev) {
        if (!dragging) return;
        (dragging === 'hour' ? hourHand : minuteHand).classList.remove('dragging');
        dragging = null;
        checkSolved();
      }

      hourHand.addEventListener('pointerdown', onPointerDown('hour'));
      minuteHand.addEventListener('pointerdown', onPointerDown('minute'));
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);

      // Basic keyboard support for accessibility
      function onKey(e, which) {
        const step = which === 'minute' ? 6 : 30;
        if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
          e.preventDefault();
          if (which === 'minute') setMinuteAngle(minuteAngle + step);
          else setHourAngle(hourAngle + step);
          checkSolved();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
          e.preventDefault();
          if (which === 'minute') setMinuteAngle(minuteAngle - step);
          else setHourAngle(hourAngle - step);
          checkSolved();
        }
      }
      hourHand.addEventListener('keydown', (e) => onKey(e, 'hour'));
      minuteHand.addEventListener('keydown', (e) => onKey(e, 'minute'));

      function checkSolved() {
        const isMinuteAt0 = (minuteAngle % 360) === 0;
        const isHourAt30 = (hourAngle % 360) === 30;
        if (isMinuteAt0 && isHourAt30) {
          reveal();
        }
      }

      function reveal() {
        if (secret.style.display === 'block') return; // already shown
        cipherEl.textContent = CIPHERTEXT;
        secret.style.display = 'block';
      }

      const CIPHERTEXT = 'XHVELLQ THFYLOZ XHVEOID HFCZVRE ETFYAOB SFKSLUZ ESJFTIZ KGIPFCM FIEPATT IKZYKOR JUIYPTG VEKSHTN PEEOLDU RTFLDAX PUEEPLQ ZEEXLMA VYJEVPB IDSZAHQ VIERDIF LIKDAUP INKDZTD IADPKPM WTVGLRK LOLCPNZ SIJJIUD WTJOVOD WSCLTMU RGCLBGT XEIPJHA MNXDVMQ SNVLSWM CSTLSLU RGFFATA WODPVNQ ILJPPNF LEDTKDX IOWLSLF LAKDOIR XIERSIR ITYPVLP THFYLSQ IMVOHLY SSKPTBM VRRDZEP XOVIPSF ERVWPCX IFKMLHU RDSJZOY IPIPCIA YSMPYSU SNFQAHQ FUZWKIZ KIKSHDZ IVVCYUZ KIELSLF LEPPHRE MDNLSKQ HBPTASA AHVYAHQ FECWZUP HEEWFST ETKPYEP XHVXPDY SRETUGC YIVEPAX QOJEKIP RTIPJOS RIQPAHQ WOLYKTT IHRWSWM CHROLMB XIVOQUE XMFXLNF WBVQVRQ PERGPNS SNCJAHQ LUDZMDU WTRYACX ESJCVOY WIYPZIF ETVOAHQ RLZQAEP XHVCLCQ MVVCHSU RGCPCOU GETLSMM RDLYOUD VIVOZPA OEFYLIZ WTIFJTU SNCZVKU RTYPJAN MNVEIEZ IAKSAHQ THFYLTT ICRWSEZ HEUMLFA VEZNVUX HSRJHWA VDWZYAI LICPPJG WTJEHRQ HAKEOES VEPNHBU REKYVTU GIERPTE GHZAWEP GOIYLRE ENUEOER EIEEZCG JFCTUEE AHVCLCA YNKWLSE WHFPZHM HBIFZHQ HAXLPNE XIKEOEZ MKEPSTS VAJALDF LETZVLY ITRWOAZ HLVLUDA TEEPKTT IDFZYIZ WIUPDAE ROKSPNS FUKOBSF EFROPNS GLVLUIZ KSTSLDG PEKLWEP XOKSLBM GKNLSLM RDEPHRF LEIPHRM WMRWSWA SDVYIOJ MPLWSEP MTFFACM VEWFSLK MTNLZHQ EVZPYTT ENZESOA OEUTASE YRWLJEI SREDTOA XHRDPFR VODMLIZ KHVWKOR XEELUDF LOLROTR YLCJFEF MCFFSDZ XIDLNIZ IAEJVNQ MNKSLBG MLUTUGI LOJEPLX YSVOAHU WHRWSWM CPYZUEX ITRWVNQ INKCBSF IDRMVXF STYPJAN MNVEIEZ IAKSPTH SITPZBQ KAEEVSI ILCLNAU RFIZTAD SUEOAHQ GOIYLRF LEEPETO PAJDJHM RGVLWPD SATSPNS PIBPHTU HESFASF ENUTUGF LEIPDIF LTYPIOJ MNDJOAZ HSKSLNA MSVQLLF JAILDAK MTNLZAE XHFFNHF LEGSVNQ LAUCLAO LEULJRA WSKTTEF SDVWPVQ VSFXLTT MNXEOAF LAUMLEZ AAZEPNS UUZPALK JOITASY SMVYATA FEWZBNP';
    })();
  </script>
</body>
</html>
