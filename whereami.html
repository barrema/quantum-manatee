<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<body>
<main class="wrap">
<h1>time for lab?</h1>
<div class="sub">Drag the hands to set the time. Hint: some moments unlock what’s hidden.</div>

<div id="clock" class="clock">
  <div class="pivot"></div>
  <div id="hour-hand" class="hand hour" tabindex="0"></div>
  <div id="minute-hand" class="hand minute" tabindex="0"></div>
</div>

<div id="secret">
  <h2>Revealed text</h2>
  <div id="cipher" class="cipher"></div>
</div>

<div class="footer">This page is a single-file GitHub Pages site.</div>
</main>

<script>
(function() {
  const clock = document.getElementById('clock');
  const hourHand = document.getElementById('hour-hand');
  const minuteHand = document.getElementById('minute-hand');
  const secret = document.getElementById('secret');
  const cipherEl = document.getElementById('cipher');

  /* Make clock ticks */
  for (let i = 0; i < 60; i++) {
    const t = document.createElement('div');
    t.className = 'tick' + (i % 5 === 0 ? ' major' : '');
    t.style.transform = `translate(-50%, -100%) rotate(${i * 6}deg)`;
    clock.appendChild(t);
  }

  let hourAngle = 0;
  let minuteAngle = 0;
  let dragging = null;

  const setHourAngle = deg => {
    hourAngle = ((deg % 360) + 360) % 360;
    hourHand.style.transform = `translate(-50%, -100%) rotate(${hourAngle}deg)`;
  };
  const setMinuteAngle = deg => {
    minuteAngle = ((deg % 360) + 360) % 360;
    minuteHand.style.transform = `translate(-50%, -100%) rotate(${minuteAngle}deg)`;
  };

  setHourAngle(0);
  setMinuteAngle(0);

  function getAngle(ev) {
    const rect = clock.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const x = ev.clientX - cx;
    const y = ev.clientY - cy;
    const ang = Math.atan2(x, -y) * 180 / Math.PI;
    return (ang + 360) % 360;
  }

  function snap(v, step) {
    return Math.round(v / step) * step;
  }

  function onPointerDown(which) {
    return function(ev) {
      ev.preventDefault();
      dragging = which;

      // FIXED FOR GITHUB PAGES:
      if (ev.target.setPointerCapture) {
        ev.target.setPointerCapture(ev.pointerId);
      }

      (which === 'hour' ? hourHand : minuteHand)
        .classList.add('dragging');
    }
  }

  function onPointerMove(ev) {
    if (!dragging) return;
    const ang = getAngle(ev);
    if (dragging === 'minute') setMinuteAngle(snap(ang,6));
    else setHourAngle(snap(ang,30));
  }

  function onPointerUp(ev) {
    if (!dragging) return;
    (dragging === 'hour' ? hourHand : minuteHand)
      .classList.remove('dragging');
    dragging = null;
    checkSolved();
  }

  hourHand.addEventListener('pointerdown', onPointerDown('hour'));
  minuteHand.addEventListener('pointerdown', onPointerDown('minute'));
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);

  function checkSolved() {
    if ((minuteAngle % 360) === 0 && (hourAngle % 360) === 30) {
      reveal();
    }
  }

  function reveal() {
    if (secret.style.display === 'block') return;
    cipherEl.textContent = CIPHERTEXT;
    secret.style.display = 'block';
  }

  const CIPHERTEXT = `XHVELLQ THFYLOZ ... FEWZBNP`;
})();
</script>
</body>
</html>
